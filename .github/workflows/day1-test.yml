name: Day 3 - Build and Test Pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build step (dummy build)
        run: |
          echo "🔨 Build started"
          ls -la
          echo "✅ Build completed"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test index.html exists
        run: |
          test -f index.html
          echo "✅ Test passed: index.html exists"
